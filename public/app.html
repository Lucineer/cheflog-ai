<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cheflog.ai — Professional Kitchen Management</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --steel:#E5E7EB;--steel-dark:#9CA3AF;--steel-light:#F3F4F6;
  --black:#111827;--black-mid:#1F2937;--black-light:#374151;
  --red:#DC2626;--red-dark:#991B1B;--red-light:#FEE2E2;
  --white:#FFFFFF;--success:#059669;--warning:#D97706;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
}
html{font-family:var(--font);background:var(--steel-light);color:var(--black)}
a{color:var(--red);text-decoration:none}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;background:var(--black);color:var(--steel);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px;border-bottom:1px solid var(--black-light)}
.sidebar-brand h1{font-size:20px;color:var(--white);letter-spacing:-0.5px}
.sidebar-brand h1 span{color:var(--red)}
.sidebar-brand p{font-size:11px;color:var(--steel-dark);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--steel-dark);cursor:pointer;font-size:13px;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--black-mid);color:var(--steel)}
.nav-item.active{background:var(--black-mid);color:var(--white);border-left-color:var(--red)}
.nav-icon{width:18px;text-align:center;font-size:14px}
.sidebar-footer{padding:12px 20px;border-top:1px solid var(--black-light);font-size:11px;color:var(--steel-dark)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;background:var(--white);border-bottom:1px solid var(--steel);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600;color:var(--black)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar-badge{background:var(--red);color:var(--white);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px}

/* Cards & Tables */
.card{background:var(--white);border-radius:8px;border:1px solid var(--steel);margin-bottom:16px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--steel);display:flex;align-items:center;justify-content:between}
.card-header h3{font-size:14px;font-weight:600}
.card-body{padding:20px}
.card-body.no-pad{padding:0}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--steel-dark);border-bottom:2px solid var(--steel);font-weight:600;background:var(--steel-light)}
td{padding:10px 16px;border-bottom:1px solid var(--steel)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--steel-light)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s}
.btn-primary{background:var(--red);color:var(--white)}.btn-primary:hover{background:var(--red-dark)}
.btn-secondary{background:var(--white);color:var(--black);border-color:var(--steel)}.btn-secondary:hover{background:var(--steel-light)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:transparent;color:var(--steel-dark)}.btn-ghost:hover{background:var(--steel-light)}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-red{background:var(--red-light);color:var(--red-dark)}
.tag-green{background:#D1FAE5;color:#065F46}
.tag-yellow{background:#FEF3C7;color:#92400E}
.tag-gray{background:var(--steel);color:var(--black-light)}

/* Stats row */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat{background:var(--white);border:1px solid var(--steel);border-radius:8px;padding:16px 20px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--steel-dark);margin-bottom:4px}
.stat-value{font-size:24px;font-weight:700;color:var(--black)}
.stat-sub{font-size:12px;color:var(--steel-dark);margin-top:2px}

/* Chat */
.chat-container{display:flex;flex-direction:column;height:100%}
.chat-messages{flex:1;overflow-y:auto;padding:20px}
.msg{margin-bottom:16px;display:flex;gap:10px}
.msg-user .msg-bubble{background:var(--black);color:var(--white);border-radius:12px 12px 4px 12px}
.msg-ai .msg-bubble{background:var(--steel-light);color:var(--black);border-radius:12px 12px 12px 4px}
.msg-bubble{max-width:70%;padding:12px 16px;font-size:13px;line-height:1.6;white-space:pre-wrap}
.msg-user{flex-direction:row-reverse}
.chat-input{padding:16px;border-top:1px solid var(--steel);display:flex;gap:8px}
.chat-input input{flex:1;padding:10px 16px;border:1px solid var(--steel);border-radius:8px;font-size:13px;outline:none}
.chat-input input:focus{border-color:var(--red)}

/* Recipe detail */
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.recipe-ingredients{list-style:none}
.recipe-ingredients li{padding:6px 0;border-bottom:1px solid var(--steel);font-size:13px;display:flex;justify-content:space-between}
.recipe-method{counter-reset:step;list-style:none}
.recipe-method li{counter-increment:step;padding:8px 0 8px 32px;position:relative;font-size:13px;line-height:1.5}
.recipe-method li::before{content:counter(step);position:absolute;left:0;top:8px;width:22px;height:22px;background:var(--red);color:var(--white);border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:600}

/* Allergen matrix */
.matrix-table td,.matrix-table th{text-align:center;padding:8px}
.matrix-check{color:var(--success);font-size:18px}
.matrix-x{color:var(--red);font-size:18px;font-weight:700}

/* Forms */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--black-light)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--steel);border-radius:6px;font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--red)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Progress bar */
.progress{height:8px;background:var(--steel);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .3s}
.progress-green .progress-bar{background:var(--success)}
.progress-red .progress-bar{background:var(--red)}
.progress-yellow .progress-bar{background:var(--warning)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--white);border-radius:12px;width:90%;max-width:600px;max-height:80vh;overflow-y:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--steel);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:600}
.modal-body{padding:20px}

/* Utilities */
.flex{display:flex}.gap-8{gap:8px}.gap-16{gap:16px}.gap-24{gap:24px}
.ml-auto{margin-left:auto}
.text-sm{font-size:13px}.text-xs{font-size:11px}
.text-gray{color:var(--steel-dark)}.text-red{color:var(--red)}.text-green{color:var(--success)}.text-bold{font-weight:600}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mb-16{margin-bottom:16px}
.hidden{display:none!important}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--steel);margin-bottom:20px}
.tab{padding:8px 20px;font-size:13px;cursor:pointer;color:var(--steel-dark);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--black)}.tab.active{color:var(--red);border-bottom-color:var(--red);font-weight:600}
.search-input{padding:8px 12px;border:1px solid var(--steel);border-radius:6px;font-size:13px;outline:none;width:240px}
.search-input:focus{border-color:var(--red)}
.engineering-star{color:#F59E0B}.engineering-puzzle{color:#8B5CF6}.engineering-plowhorse{color:#3B82F6}.engineering-dog{color:var(--steel-dark)}
.plating-box{background:var(--black);color:var(--steel);padding:12px 16px;border-radius:6px;font-style:italic;font-size:13px;line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>cheflog<span>.ai</span></h1>
      <p>Kitchen Command</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-view="chat"><span class="nav-icon">&#9998;</span> Chef Chat</div>
      <div class="nav-item" data-view="recipes"><span class="nav-icon">&#9776;</span> Recipes</div>
      <div class="nav-item" data-view="inventory"><span class="nav-icon">&#9733;</span> Inventory</div>
      <div class="nav-item" data-view="menu"><span class="nav-icon">&#9776;</span> Menu Planner</div>
      <div class="nav-item" data-view="costing"><span class="nav-icon">&#9830;</span> Food Costing</div>
      <div class="nav-item" data-view="suppliers"><span class="nav-icon">&#9993;</span> Suppliers</div>
      <div class="nav-item" data-view="allergens"><span class="nav-icon">&#9888;</span> Allergens</div>
    </nav>
    <div class="sidebar-footer">cheflog.ai v1.0 &mdash; Professional Edition</div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Chef Chat</span>
      <div class="topbar-right">
        <span class="topbar-badge" id="alert-badge" style="display:none">0</span>
      </div>
    </div>
    <div class="content" id="content">
      <!-- Views injected here -->
    </div>
  </main>
</div>

<script>
const API = '';
let currentView = 'chat';
let chatMessages = [];
let allRecipes = [];
let allInventory = [];
let allSuppliers = [];
let allAllergens = {};

// ─── Navigation ─────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    currentView = item.dataset.view;
    document.getElementById('topbar-title').textContent = {
      chat:'Chef Chat',recipes:'Recipe Database',inventory:'Kitchen Inventory',
      menu:'Menu Planner',costing:'Food Cost Analysis',suppliers:'Supplier Directory',allergens:'Allergen Management'
    }[currentView];
    loadView(currentView);
  });
});

function loadView(view) {
  const c = document.getElementById('content');
  switch(view) {
    case 'chat': renderChat(c); break;
    case 'recipes': loadRecipes(); break;
    case 'inventory': loadInventory(); break;
    case 'menu': loadMenu(); break;
    case 'costing': loadCosting(); break;
    case 'suppliers': loadSuppliers(); break;
    case 'allergens': loadAllergens(); break;
  }
}

// ─── API helpers ────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(API + path, { headers: {'Content-Type':'application/json'}, ...opts });
  return r.json();
}

// ─── Chat View ──────────────────────────────────────────────────────
function renderChat(container) {
  container.innerHTML = `
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages">
        <div class="msg msg-ai">
          <div class="msg-bubble">Good evening, Chef. Your kitchen is ready.\n\nI can help with recipe development, menu planning, food costing, inventory, and plating. What are we working on tonight?</div>
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Ask about recipes, costs, techniques..." autocomplete="off">
        <button class="btn btn-primary" onclick="sendChat()">Send</button>
      </div>
    </div>`;
  document.getElementById('chat-input').addEventListener('keydown', e => { if(e.key==='Enter') sendChat(); });
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const messagesDiv = document.getElementById('chat-messages');
  messagesDiv.innerHTML += `<div class="msg msg-user"><div class="msg-bubble">${escHtml(msg)}</div></div>`;

  chatMessages.push({ role:'user', content: msg });
  messagesDiv.innerHTML += `<div class="msg msg-ai" id="stream-msg"><div class="msg-bubble" id="stream-bubble">...</div></div>`;
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  try {
    const resp = await fetch(API + '/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages: chatMessages })
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    const bubble = document.getElementById('stream-bubble');
    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for(const line of lines) {
        if(line.startsWith('data: ')) {
          const data = line.slice(6);
          if(data === '[DONE]') continue;
          try {
            const j = JSON.parse(data);
            const delta = j.choices?.[0]?.delta?.content || '';
            full += delta;
            bubble.textContent = full;
          } catch {}
        }
      }
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    chatMessages.push({ role:'assistant', content: full });
  } catch(e) {
    document.getElementById('stream-bubble').textContent = 'Connection error. The DeepSeek API key may not be configured.';
  }
}

// ─── Recipes View ───────────────────────────────────────────────────
async function loadRecipes() {
  allRecipes = await api('/api/recipes');
  renderRecipes();
}

function renderRecipes() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="flex gap-16 mb-16">
      <input class="search-input" id="recipe-search" placeholder="Search recipes..." oninput="filterRecipes()">
      <button class="btn btn-primary" onclick="showRecipeForm()">+ New Recipe</button>
    </div>
    <div class="card"><div class="card-body no-pad">
      <table>
        <thead><tr><th>Recipe</th><th>Category</th><th>Cuisine</th><th>Prep</th><th>Cost/Srv</th><th>Allergens</th><th></th></tr></thead>
        <tbody id="recipe-tbody"></tbody>
      </table>
    </div></div>
    <div id="recipe-detail"></div>`;
  renderRecipeRows(allRecipes);
}

function renderRecipeRows(recipes) {
  const tbody = document.getElementById('recipe-tbody');
  if(!tbody) return;
  tbody.innerHTML = recipes.map(r => `
    <tr onclick="showRecipeDetail('${r.id}')" style="cursor:pointer">
      <td class="text-bold">${escHtml(r.name)}</td>
      <td><span class="tag tag-gray">${r.category}</span></td>
      <td>${r.cuisine}</td>
      <td>${r.prepTimeMin}+${r.cookTimeMin} min</td>
      <td>$${r.costPerServing.toFixed(2)}</td>
      <td>${r.allergens.map(a=>`<span class="tag tag-red">${a}</span>`).join(' ') || '—'}</td>
      <td><span class="btn btn-sm btn-ghost">View</span></td>
    </tr>`).join('');
}

function filterRecipes() {
  const q = document.getElementById('recipe-search').value.toLowerCase();
  const filtered = allRecipes.filter(r =>
    r.name.toLowerCase().includes(q) || r.cuisine.toLowerCase().includes(q) ||
    r.tags.some(t => t.toLowerCase().includes(q)) || r.category.toLowerCase().includes(q)
  );
  renderRecipeRows(filtered);
}

function showRecipeDetail(id) {
  const r = allRecipes.find(x => x.id === id);
  if(!r) return;
  const detail = document.getElementById('recipe-detail');
  detail.innerHTML = `
    <div class="card"><div class="card-header"><h3>${escHtml(r.name)}</h3>
      <div class="flex gap-8 ml-auto">
        ${r.dietary.map(d=>`<span class="tag tag-green">${d}</span>`).join('')}
        ${r.allergens.map(a=>`<span class="tag tag-red">${a}</span>`).join('')}
      </div>
    </div></div>
    <div class="recipe-grid">
      <div class="card"><div class="card-header"><h3>Ingredients</h3><span class="text-xs text-gray">${r.servings} servings</span></div>
        <div class="card-body"><ul class="recipe-ingredients">
          ${r.ingredients.map(i=>`<li><span>${i.quantity} ${i.unit} ${escHtml(i.name)} ${i.prepNotes?'<span class="text-gray text-xs">('+escHtml(i.prepNotes)+')</span>':''}</span><span>$${i.cost.toFixed(2)}</span></li>`).join('')}
        </ul></div>
      </div>
      <div class="card"><div class="card-header"><h3>Method</h3><span class="text-xs text-gray">${r.prepTimeMin} prep + ${r.cookTimeMin} cook</span></div>
        <div class="card-body"><ol class="recipe-method">
          ${r.method.map(s=>`<li>${escHtml(s)}</li>`).join('')}
        </ol></div>
      </div>
    </div>
    <div class="card mt-16"><div class="card-header"><h3>Plating</h3></div>
      <div class="card-body"><div class="plating-box">${escHtml(r.plating)}</div></div>
    </div>
    <div class="card mt-16"><div class="card-header"><h3>Tags</h3></div>
      <div class="card-body"><div class="flex gap-8">${r.tags.map(t=>`<span class="tag tag-gray">${t}</span>`).join('')}</div></div>
    </div>`;
}

function showRecipeForm() {
  const detail = document.getElementById('recipe-detail');
  if(!detail) return;
  detail.innerHTML = `
    <div class="card"><div class="card-header"><h3>New Recipe</h3><button class="btn btn-sm btn-ghost" onclick="document.getElementById('recipe-detail').innerHTML=''">Close</button></div>
      <div class="card-body">
        <div class="form-row"><div class="form-group"><label>Recipe Name</label><input id="nr-name"></div>
        <div class="form-group"><label>Category</label><select id="nr-cat"><option>entree</option><option>appetizer</option><option>dessert</option><option>soup</option><option>side</option></select></div></div>
        <div class="form-row"><div class="form-group"><label>Cuisine</label><input id="nr-cuisine" value="French"></div>
        <div class="form-group"><label>Servings</label><input id="nr-servings" type="number" value="4"></div></div>
        <div class="form-row"><div class="form-group"><label>Prep Time (min)</label><input id="nr-prep" type="number" value="15"></div>
        <div class="form-group"><label>Cook Time (min)</label><input id="nr-cook" type="number" value="20"></div></div>
        <div class="form-group"><label>Plating Notes</label><textarea id="nr-plating" rows="2"></textarea></div>
        <button class="btn btn-primary" onclick="submitRecipe()">Create Recipe</button>
      </div>
    </div>`;
}

async function submitRecipe() {
  const recipe = {
    name: document.getElementById('nr-name').value,
    category: document.getElementById('nr-cat').value,
    cuisine: document.getElementById('nr-cuisine').value,
    servings: +document.getElementById('nr-servings').value,
    prepTimeMin: +document.getElementById('nr-prep').value,
    cookTimeMin: +document.getElementById('nr-cook').value,
    plating: document.getElementById('nr-plating').value,
    ingredients: [], method: [], allergens: [], dietary: [], tags: [], costPerServing: 0,
  };
  await api('/api/recipes', { method:'POST', body: JSON.stringify(recipe) });
  loadRecipes();
}

// ─── Inventory View ─────────────────────────────────────────────────
async function loadInventory() {
  allInventory = await api('/api/inventory');
  const belowPar = await api('/api/inventory/below-par');
  const val = await api('/api/inventory/total-value');
  renderInventory(allInventory, belowPar.length, val.totalValue);
}

function renderInventory(items, alertCount, totalVal) {
  const alertBadge = document.getElementById('alert-badge');
  if(alertCount > 0) { alertBadge.style.display = ''; alertBadge.textContent = alertCount; }

  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-label">Total Items</div><div class="stat-value">${items.length}</div></div>
      <div class="stat"><div class="stat-label">Inventory Value</div><div class="stat-value">$${totalVal.toFixed(0)}</div></div>
      <div class="stat"><div class="stat-label">Below Par</div><div class="stat-value text-red">${alertCount}</div></div>
      <div class="stat"><div class="stat-label">Categories</div><div class="stat-value">${new Set(items.map(i=>i.category)).size}</div></div>
    </div>
    <div class="card"><div class="card-header"><h3>Inventory Items</h3>
      <select class="search-input ml-auto" onchange="filterInventory(this.value)" style="width:160px">
        <option value="">All Categories</option>
        ${[...new Set(items.map(i=>i.category))].map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
    </div>
    <div class="card-body no-pad"><table>
      <thead><tr><th>Item</th><th>Category</th><th>Stock</th><th>Par Level</th><th>Status</th><th>Location</th><th>Unit Cost</th><th>Value</th></tr></thead>
      <tbody>${items.map(i => {
        const pct = (i.currentStock / i.parLevel) * 100;
        const status = pct <= 25 ? 'tag-red' : pct <= 75 ? 'tag-yellow' : 'tag-green';
        const statusText = pct <= 25 ? 'Low' : pct <= 75 ? 'Adequate' : 'Good';
        return `<tr>
          <td class="text-bold">${escHtml(i.name)}</td>
          <td><span class="tag tag-gray">${i.category}</span></td>
          <td>${i.currentStock} ${i.unit}</td>
          <td>${i.parLevel} ${i.unit}</td>
          <td><span class="tag ${status}">${statusText}</span>
            <div class="progress progress-${pct<=25?'red':pct<=75?'yellow':'green'}" style="width:60px;margin-top:4px"><div class="progress-bar" style="width:${Math.min(pct,100)}%"></div></div>
          </td>
          <td class="text-xs">${escHtml(i.location)}</td>
          <td>$${i.costPerUnit.toFixed(2)}</td>
          <td>$${(i.currentStock * i.costPerUnit).toFixed(2)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
}

function filterInventory(cat) {
  if(!cat) { renderInventory(allInventory, 0, 0); return; }
  const filtered = allInventory.filter(i => i.category === cat);
  renderInventory(filtered, filtered.filter(i=>i.currentStock<=i.reorderPoint).length, filtered.reduce((s,i)=>s+i.currentStock*i.costPerUnit,0));
}

// ─── Menu Planner View ──────────────────────────────────────────────
async function loadMenu() {
  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay()+6)%7));
  const weekKey = monday.toISOString().slice(0,10);
  const week = await api('/api/menu-planning?week='+weekKey);
  const seasonal = await api('/api/menu-planning?seasonal='+(today.getMonth()+1));
  allRecipes = allRecipes.length ? allRecipes : await api('/api/recipes');
  renderMenu(week, seasonal);
}

function renderMenu(week, seasonal) {
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-label">Seasonal Produce</div><div class="stat-value text-sm" style="font-size:14px">${seasonal.produce.join(', ')}</div></div>
    </div>
    <div class="card"><div class="card-header"><h3>Weekly Menu</h3></div>
    <div class="card-body no-pad"><table>
      <thead><tr><th>Day</th><th>Service</th><th>Items</th></tr></thead>
      <tbody>${week.map((d,i) => {
        const itemCount = d.items.length;
        const items = d.items.map(mi => {
          const recipe = allRecipes.find(r=>r.id===mi.recipeId);
          const featured = mi.featured ? ' <span class="tag tag-red">Featured</span>' : '';
          return recipe ? `<span class="tag tag-gray">${recipe.name} — $${mi.price}</span>${featured}` : '';
        }).join(' ');
        return `<tr><td class="text-bold">${days[i]}</td><td><span class="tag tag-gray">${d.service}</span></td>
          <td>${itemCount ? items : '<span class="text-gray">No service</span>'}</td></tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
}

// ─── Costing View ───────────────────────────────────────────────────
async function loadCosting() {
  const data = await api('/api/costing');
  const engineering = await api('/api/costing/menu-engineering');
  renderCosting(data, engineering);
}

function renderCosting(data, engineering) {
  const c = document.getElementById('content');
  const avgCost = data.recipes.length ? data.recipes.reduce((s,r)=>s+r.costPerServing,0)/data.recipes.length : 0;
  c.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-label">Target Food Cost</div><div class="stat-value">${(data.targetFoodCostPct*100).toFixed(0)}%</div></div>
      <div class="stat"><div class="stat-label">Avg Cost/Serving</div><div class="stat-value">$${avgCost.toFixed(2)}</div></div>
      <div class="stat"><div class="stat-label">Recipes Analyzed</div><div class="stat-value">${data.recipes.length}</div></div>
    </div>
    <div class="card"><div class="card-header"><h3>Recipe Cost Breakdown</h3></div>
    <div class="card-body no-pad"><table>
      <thead><tr><th>Recipe</th><th>Total Cost</th><th>Servings</th><th>Cost/Serving</th><th>Suggested Price</th><th>Food Cost %</th></tr></thead>
      <tbody>${data.recipes.map(r => `<tr>
        <td class="text-bold">${escHtml(r.recipeName)}</td>
        <td>$${r.totalCost.toFixed(2)}</td>
        <td>${r.servings}</td>
        <td>$${r.costPerServing.toFixed(2)}</td>
        <td class="text-green text-bold">$${r.suggestedPrice.toFixed(2)}</td>
        <td>${(r.foodCostPct*100).toFixed(0)}%</td>
      </tr>`).join('')}</tbody>
    </table></div></div>
    <div class="card mt-16"><div class="card-header"><h3>Menu Engineering Matrix</h3></div>
    <div class="card-body no-pad"><table>
      <thead><tr><th>Item</th><th>Food Cost</th><th>Menu Price</th><th>Cost %</th><th>Contribution</th><th>Popularity</th><th>Classification</th></tr></thead>
      <tbody>${engineering.map(e => {
        const cls = {star:'engineering-star',plowhorse:'engineering-puzzle',puzzle:'engineering-puzzle',dog:'engineering-dog'}[e.classification];
        const label = e.classification.charAt(0).toUpperCase()+e.classification.slice(1);
        return `<tr>
          <td class="text-bold">${escHtml(e.name)}</td>
          <td>$${e.foodCost.toFixed(2)}</td>
          <td>$${e.menuPrice.toFixed(2)}</td>
          <td>${(e.foodCostPct*100).toFixed(1)}%</td>
          <td class="text-green text-bold">$${e.contribution.toFixed(2)}</td>
          <td>${e.popularity} sold</td>
          <td class="${cls} text-bold">${label}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
}

// ─── Suppliers View ─────────────────────────────────────────────────
async function loadSuppliers() {
  allSuppliers = await api('/api/suppliers');
  renderSuppliers(allSuppliers);
}

function renderSuppliers(suppliers) {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="stats">
      ${suppliers.map(s => `
        <div class="stat">
          <div class="stat-label">${escHtml(s.category).toUpperCase()}</div>
          <div class="stat-value" style="font-size:16px">${escHtml(s.name)}</div>
          <div class="stat-sub">${s.leadTimeDays}d lead &bull; $${s.minOrder} min &bull; ${s.terms}</div>
        </div>`).join('')}
    </div>
    ${suppliers.map(s => `
    <div class="card"><div class="card-header">
      <h3>${escHtml(s.name)}</h3>
      <div class="flex gap-8 ml-auto">
        <span class="tag tag-gray">${s.category}</span>
        <span class="tag tag-green">Rating: ${s.rating}/5</span>
      </div>
    </div><div class="card-body">
      <div class="form-row">
        <div><strong>Rep:</strong> ${escHtml(s.repName)}</div>
        <div><strong>Phone:</strong> ${escHtml(s.phone)}</div>
        <div><strong>Email:</strong> ${escHtml(s.email)}</div>
      </div>
      <div class="mt-8"><strong>Address:</strong> ${escHtml(s.address)}</div>
      <div class="mt-8 text-sm text-gray">${escHtml(s.notes)}</div>
      ${s.orderHistory.length ? `<table class="mt-16"><thead><tr><th>Order Date</th><th>Items</th><th>Total</th><th>Status</th></tr></thead>
        <tbody>${s.orderHistory.map(o => {
          const statusCls = o.status==='delivered'?'tag-green':o.status==='confirmed'?'tag-yellow':'tag-gray';
          return `<tr><td>${new Date(o.date).toLocaleDateString()}</td>
            <td class="text-sm">${o.items.map(i=>escHtml(i.name)).join(', ')}</td>
            <td class="text-bold">$${o.total.toFixed(2)}</td>
            <td><span class="tag tag-${statusCls}">${o.status}</span></td></tr>`;
        }).join('')}</tbody></table>` : '<div class="text-gray text-sm mt-16">No orders on file.</div>'}
    </div></div>`).join('')}`;
}

// ─── Allergens View ─────────────────────────────────────────────────
async function loadAllergens() {
  allAllergens = await api('/api/allergens');
  const major = await api('/api/allergens/major');
  const matrix = await api('/api/allergens/matrix');
  allRecipes = allRecipes.length ? allRecipes : await api('/api/recipes');
  renderAllergens(major, matrix);
}

function renderAllergens(major, matrix) {
  const profiles = allAllergens.profiles || [];
  const recipeAllergens = allAllergens.recipeAllergens || {};
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-label">Profiles Tracked</div><div class="stat-value">${profiles.length}</div></div>
      <div class="stat"><div class="stat-label">Recipes Mapped</div><div class="stat-value">${Object.keys(recipeAllergens).length}</div></div>
      <div class="stat"><div class="stat-label">Major Allergens</div><div class="stat-value">${major.length}</div></div>
    </div>
    <div class="card"><div class="card-header"><h3>Allergen Profiles</h3></div>
    <div class="card-body no-pad"><table>
      <thead><tr><th>Profile</th><th>Restrictions</th><th>Severity</th><th>Notes</th></tr></thead>
      <tbody>${profiles.map(p => `<tr>
        <td class="text-bold">${escHtml(p.name)}</td>
        <td>${p.restrictions.map(r=>`<span class="tag tag-red">${r}</span>`).join(' ')}</td>
        <td>${Object.entries(p.severity).map(([k,v])=>`<span class="text-xs">${k}: ${v}</span>`).join(', ')}</td>
        <td class="text-sm text-gray">${escHtml(p.notes)}</td>
      </tr>`).join('')}</tbody>
    </table></div></div>
    <div class="card mt-16"><div class="card-header"><h3>Cross-Reference Matrix</h3><span class="text-xs text-gray ml-auto">Safe = recipe has no conflict with profile restrictions</span></div>
    <div class="card-body no-pad"><table class="matrix-table">
      <thead><tr><th>Recipe</th>${profiles.map(p=>`<th>${escHtml(p.name).split('—')[0].trim()}</th>`).join('')}</tr></thead>
      <tbody>${Object.entries(matrix).map(([rid, profs]) => {
        const recipe = allRecipes.find(r=>r.id===rid);
        return `<tr><td class="text-bold">${recipe?escHtml(recipe.name):rid}</td>
          ${profiles.map(p=>`<td>${profs[p.id]?'<span class="matrix-check">&#10003;</span>':'<span class="matrix-x">&#10007;</span>'}</td>`).join('')}</tr>`;
      }).join('')}</tbody>
    </table></div></div>
    <div class="card mt-16"><div class="card-header"><h3>Recipe Allergen Map</h3></div>
    <div class="card-body no-pad"><table>
      <thead><tr><th>Recipe</th><th>Contains Allergens</th></tr></thead>
      <tbody>${Object.entries(recipeAllergens).map(([rid,allgs]) => {
        const recipe = allRecipes.find(r=>r.id===rid);
        return `<tr><td class="text-bold">${recipe?escHtml(recipe.name):rid}</td>
          <td>${allgs.map(a=>`<span class="tag tag-red">${a}</span>`).join(' ')}</td></tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
}

// ─── Utils ──────────────────────────────────────────────────────────
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Init ───────────────────────────────────────────────────────────
loadView('chat');
</script>
